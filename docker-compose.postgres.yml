version: 
3.8

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: lincomms
      POSTGRES_PASSWORD: lincomms
      POSTGRES_DB: lincomms_dev
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

